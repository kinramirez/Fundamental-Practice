<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
    <button onclick="print1to10()">Print 1 to 10</button>
    <div id="output"></div>

    <section id="sumOfTwo">
        <h2>Sum of Two Numbers</h2>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <button onclick="sum()">Calculate Sum</button>
        <div id="result"></div>
    </section>

    <section id="evenNumber">
        <h2>Even or Odd</h2>
        <input type="number" id="num" placeholder="Enter number">
        <button id="check">Check Even/Odd</button>
        <div id="output3"></div>
    </section>

    <section id="secondsConverter">
        <input type="number" id="minutes" placeholder="Enter minute">
        <button id="convert" onclick="secondsConverter()">Convert to Seconds</button>
        <div id="seconds"></div>
    </section>

    <section id="firstElement">
        <button onclick="getFirstElement()">Get First Element of Array</button>
        <div id="firstElement"></div>
    </section>

    <section id="part2">
        <button onclick="window.location.href='PracticeHard.html'">Practice Level Up</button>
    </section>
    <script src="assets/js/practice.js"></script>
</body>
</html>

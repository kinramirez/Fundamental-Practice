<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section id="saleAmount">
        <input type="number" id="inputAmount" placeholder="Enter Sale Amount">
        <button id="addSale" onclick="addSale()">Add Sale</button>
        <h5>Sales List:</h5>
        <div id="saleList">
        </div>        
        <button id="totalSales" onclick="sumArray()">Total Sales</button>
        <div id="total"></div><br>
        <button id="clear" onclick="clearSales()">Clear Sales</button>
    </section>
    <br>    
    <section id="findMax">
        <input type="number" id="score" placeholder="Enter Score">
        <button id="addScore" onclick="addScore()">Add Score</button>
        <div id="scoreList"></div>
        <button id="highestScore" onclick="findHighestScore()">Find Highest Score</button>
        <button id="clearScore" onclick="clearScore()">Clear</button>
        <div id="highestResult"></div>
    </section>

    <section id="findMin">
        <input type="number" id="temp" placeholder="Enter Your Temperature">
        <button id="addTemp" onclick="addTemp()">Add Reading</button>
        <div id="tempList"></div>
        <button id="lowestTemp" onclick="findLowest()">Find Lowest Temperature</button>
        <button idc="clearScore" onclick="clearTemp()">Clear</button>
        <div id="lowestResult"></div>
    </section>

    <section id="studentCounter">
        <input id="studentName" type="text" placeholder="Enter Student Name: "> 
        <button id="registerStudent" onclick="addCount()">Register</button>
        <div id="studentList"></div>
        <button id="studentCount" onclick="studentCount()">Count</button>
        <button id="clearCount" onclick="clearCount()">Clear</button>
        <div id="totalCount"></div>
    </section>

    <section id="shoppingCartCalculator">
        <input id="price" type="number" placeholder="Enter price">
        <input id="quantity" type="number" placeholder="Enter quantity">
        <button id="calculate" onclick="calculatePrice()">Calculate</button>
        <button id="clearCart" onclick="clearCart()">Clear</button>
        <div id="totalPrice"></div>
    </section>
    <script src="assets/js/practiceLvlTwo.js"></script>
</body>
</html>
